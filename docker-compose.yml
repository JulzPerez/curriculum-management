# version: '3.8'  <-- DELETE THIS LINE

services:
  db:
    image: postgres:15
    container_name: cms-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: curriculum_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - csd-research-services

  backend:
    container_name: cms-backend
    build: ./backend       # <--- ADD THIS (Tells Docker where the Dockerfile is)
    # image: ... (You don't need 'image' if you have 'build')
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app     # mount source so migration files appear on host
    networks:
      - csd-research-services
    ports:
      - "8001:8000"

  frontend:
    container_name: cms-frontend
    build: ./frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://cms.jeppy.online/api}
    depends_on:
      - backend
    networks:
      - csd-research-services
    ports:
      - "3001:3000"

volumes:
  postgres_data:

networks:
  csd-research-services:
    external: true