# =============================================================================
# jep-projects — nginx config
# Domains under jeppy.online. Add new subdomains by copying a server block.
# dt4code.online is managed separately — do not add it here.
# =============================================================================


# ─── jeppy.online — Landing Page ─────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name jeppy.online;

    ssl_certificate /etc/letsencrypt/live/jeppy.online/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/jeppy.online/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    root /var/www/jeppy;
    index index.html;

    location / {
        try_files $uri /index.html;
    }
}

server {
    listen 80;
    server_name jeppy.online;
    return 301 https://$host$request_uri;
}


# ─── cms.jeppy.online — Curriculum Management ────────────────────────────────
# SSL will be added by Certbot after running:
#   sudo certbot --nginx -d cms.jeppy.online
server {
    listen 80;
    server_name cms.jeppy.online;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}


