<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jeppy — Projects</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header p {
      color: #888;
      margin-top: 0.5rem;
      font-size: 1rem;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.25rem;
      width: 100%;
      max-width: 860px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 1.5rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.2s;
    }

    .card:hover {
      border-color: #555;
      transform: translateY(-2px);
    }

    .card h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }

    .card p {
      color: #888;
      font-size: 0.875rem;
      line-height: 1.5;
    }

    .card .url {
      display: inline-block;
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: #555;
    }

    footer {
      margin-top: 3rem;
      color: #444;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>Jeppy's Projects</h1>
    <p>A collection of things I'm building.</p>
  </header>

  <div class="projects">

    <a class="card" href="https://cms.jeppy.online">
      <h2>Curriculum Management</h2>
      <p>A system for managing curriculum, performance indicators, and academic data.</p>
      <span class="url">cms.jeppy.online</span>
    </a>

    <a class="card" href="https://dt4code.online">
      <h2>DT4Code</h2>
      <p>Design thinking for developers.</p>
      <span class="url">dt4code.online</span>
    </a>

    <!-- Add new project cards here -->

  </div>

  <footer>jeppy.online</footer>

</body>
</html>
